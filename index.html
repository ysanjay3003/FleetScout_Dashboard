<!DOCTYPE html>
<html>

<head>
    <title>Annotation Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #eef3fb;
            --panel: rgba(255, 255, 255, 0.88);
            --line: #d8e1f0;
            --text: #13233f;
            --muted: #64748b;
            --primary: #2e6bff;
            --primary-soft: #e6efff;
            --accent: #12b3a8;
            --shadow: 0 18px 48px rgba(27, 45, 94, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(46, 107, 255, 0.14), transparent 26%),
                radial-gradient(circle at top right, rgba(18, 179, 168, 0.14), transparent 22%),
                linear-gradient(180deg, #f7faff 0%, var(--bg) 100%);
        }

        button,
        input,
        select {
            font: inherit;
        }

        .container {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 24px;
            padding: 24px;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 0;
            gap: 20px;
        }

        .brand {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), #74a0ff);
            color: white;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 0.08em;
        }

        .brand svg,
        .nav-dot svg,
        .section-title-row svg,
        .report-icon svg,
        .stat-badge svg,
        .field-label svg,
        .helper svg,
        .button svg,
        .date-chip-head svg,
        .date-trigger svg,
        .team-heading svg,
        .list-meta svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-dot {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: #f3f7ff;
            border: 1px solid var(--line);
            display: grid;
            place-items: center;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-dot.active {
            background: linear-gradient(135deg, var(--primary), #5b8cff);
            color: white;
            box-shadow: 0 12px 24px rgba(46, 107, 255, 0.24);
        }

        .nav-dot:hover {
            transform: translateY(-1px);
        }

        .main {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.82);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
        }

        .eyebrow {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 6px;
        }

        .title {
            margin: 0;
            font-size: 30px;
            line-height: 1.1;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .date-chip {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f8fbff, #e9f0ff);
            border: 1px solid var(--line);
            min-width: 184px;
        }

        .date-chip-head {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
        }

        .date-chip label {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .date-chip input {
            border: 0;
            background: transparent;
            color: var(--text);
            font-size: 16px;
            font-weight: 800;
            outline: none;
            padding: 0;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.4fr 0.9fr;
            gap: 22px;
        }

        .hero-panel {
            padding: 28px;
            min-height: 240px;
            position: relative;
            overflow: hidden;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            right: -90px;
            bottom: -110px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(46, 107, 255, 0.16), transparent 68%);
        }

        .hero-stats {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 26px;
            max-width: 420px;
        }

        .mini-stat {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(216, 225, 240, 0.88);
        }

        .mini-stat strong {
            display: block;
            font-size: 28px;
            margin-bottom: 6px;
        }

        .stat-badge {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: linear-gradient(135deg, #edf3ff, #f7fbff);
            border: 1px solid rgba(216, 225, 240, 0.96);
            display: grid;
            place-items: center;
            color: var(--primary);
            flex-shrink: 0;
        }

        .stat-copy {
            display: flex;
            flex-direction: column;
        }

        .mini-stat span {
            color: var(--muted);
            font-size: 13px;
        }

        .section-title {
            margin: 0;
            font-size: 22px;
        }

        .section-copy {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .section-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .section-title-row .report-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
        }

        .form-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            color: var(--muted);
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
        }

        .field input,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(248, 251, 255, 0.96);
            border-radius: 16px;
            padding: 14px 16px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(46, 107, 255, 0.14);
            transform: translateY(-1px);
        }

        .input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.14) !important;
        }

        .field-error {
            color: #b91c1c;
            font-size: 12px;
            font-weight: 700;
            margin-top: -2px;
        }

        .date-input-wrap {
            position: relative;
        }

        .date-input-wrap input {
            padding-right: 54px;
            cursor: pointer;
        }

        .date-input-wrap input::-webkit-calendar-picker-indicator {
            opacity: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .date-trigger {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border: 0;
            background: transparent;
            color: var(--text);
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .submit-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 2px;
        }

        .helper {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 0;
            padding: 14px 22px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), #5b8cff);
            color: white;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 16px 28px rgba(46, 107, 255, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 34px rgba(46, 107, 255, 0.32);
        }

        .reports-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        .team-report-shell {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .range-report-shell {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .member-settings-shell {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .member-table-wrap {
            padding: 22px;
            overflow-x: auto;
        }

        .member-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .member-table thead th {
            text-align: left;
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0 10px 8px;
        }

        .member-table td {
            background: rgba(248, 251, 255, 0.96);
            border-top: 1px solid rgba(216, 225, 240, 0.96);
            border-bottom: 1px solid rgba(216, 225, 240, 0.96);
            padding: 10px;
            vertical-align: middle;
        }

        .member-table tr td:first-child {
            border-left: 1px solid rgba(216, 225, 240, 0.96);
            border-radius: 14px 0 0 14px;
        }

        .member-table tr td:last-child {
            border-right: 1px solid rgba(216, 225, 240, 0.96);
            border-radius: 0 14px 14px 0;
        }

        .profile-preview {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--line);
            background: #eef4ff;
            display: block;
        }

        .profile-fallback {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e4eeff;
            color: var(--primary);
            display: grid;
            place-items: center;
            font-weight: 800;
            border: 1px solid var(--line);
        }

        .name-edit-input {
            width: 100%;
            min-width: 170px;
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
        }

        .range-picker-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .range-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        .range-list-head {
            margin-bottom: 16px;
        }

        .clickable-row {
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.15s ease;
        }

        .clickable-row:hover {
            border-color: #9cb6e8;
            transform: translateY(-1px);
        }

        .clickable-row.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46, 107, 255, 0.12);
        }

        .batch-drilldown {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px dashed var(--line);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-panel {
            padding: 24px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }

        .member-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }

        .member-detail-card {
            padding: 22px;
            min-height: 280px;
        }

        .member-total {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            padding: 12px 14px;
            border-radius: 16px;
            background: linear-gradient(135deg, #edf7ff, #f8fbff);
            border: 1px solid rgba(216, 225, 240, 0.96);
            color: var(--text);
            font-weight: 800;
        }

        .member-total-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #dff1ff, #eef7ff);
            color: var(--primary);
            border: 1px solid rgba(216, 225, 240, 0.96);
            flex-shrink: 0;
        }

        .member-total-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .batch-list-title {
            margin: 8px 0 12px;
            font-size: 14px;
            color: var(--muted);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .report-card,
        .breakdown-card {
            padding: 22px;
            min-height: 320px;
        }

        .report-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }

        .report-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--primary-soft);
            color: var(--primary);
            display: grid;
            place-items: center;
            font-weight: 800;
            flex-shrink: 0;
        }

        .report-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .kicker {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .report-card h3,
        .breakdown-card h3 {
            margin: 6px 0 0;
            font-size: 24px;
            line-height: 1.15;
        }

        .list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(248, 251, 255, 0.96);
            border: 1px solid rgba(216, 225, 240, 0.96);
        }

        .list-item strong {
            display: block;
            font-size: 15px;
        }

        .list-item span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .list-meta {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .team-member-breakdown {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35;
            word-break: break-word;
        }

        .value-pill {
            min-width: 62px;
            text-align: center;
            padding: 10px 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, #dff5f1, #edfdf9);
            color: #0b7c73;
            font-weight: 800;
        }

        .batch-row-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .batch-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-button {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #f8fbff;
            color: var(--muted);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .icon-button svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-button:hover {
            transform: translateY(-1px);
            border-color: var(--primary);
            color: var(--primary);
        }

        .icon-button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .icon-button-success {
            color: #16a34a;
            border-color: rgba(22, 163, 74, 0.35);
            background: rgba(22, 163, 74, 0.08);
        }

        .icon-button-success:hover {
            color: #15803d;
            border-color: #16a34a;
        }

        .icon-button-danger {
            color: #dc2626;
            border-color: rgba(220, 38, 38, 0.35);
            background: rgba(220, 38, 38, 0.08);
        }

        .icon-button-danger:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        .batch-edit-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 120px;
            gap: 10px;
            width: 100%;
        }

        .batch-edit-input {
            width: 100%;
            border: 1px solid var(--line);
            background: #f8fbff;
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
        }

        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 18px;
        }

        .team-column {
            padding: 18px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(248, 251, 255, 0.98), rgba(240, 246, 255, 0.92));
            border: 1px solid rgba(216, 225, 240, 0.95);
        }

        .team-column h4 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .team-heading {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-stack {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .toast {
            min-width: 300px;
            max-width: 360px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 18px;
            border-radius: 20px;
            box-shadow: 0 20px 42px rgba(19, 35, 63, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(16px);
        }

        .toast-success {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.96), rgba(34, 197, 94, 0.92));
            color: white;
        }

        .toast-error {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.96), rgba(239, 68, 68, 0.92));
            color: white;
        }

        .toast-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.18);
            flex-shrink: 0;
        }

        .toast-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .toast-text {
            font-size: 13px;
            line-height: 1.45;
            color: rgba(255, 255, 255, 0.92);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 15, 31, 0.45);
            display: grid;
            place-items: center;
            padding: 16px;
            z-index: 1200;
        }

        .modal-card {
            width: min(640px, 96vw);
            max-height: 85vh;
            overflow: auto;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(216, 225, 240, 0.96);
            border-radius: 22px;
            box-shadow: 0 28px 56px rgba(19, 35, 63, 0.24);
            padding: 20px;
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .modal-head h3 {
            margin: 0;
            font-size: 22px;
        }

        .modal-copy {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .modal-total-bar {
            width: 100%;
            border-radius: 12px;
            padding: 10px 12px;
            margin: 0 0 14px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .modal-total-bar.good {
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.18), rgba(34, 197, 94, 0.22));
            border: 1px solid rgba(22, 163, 74, 0.35);
            color: #166534;
        }

        .modal-total-bar.bad {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.14), rgba(239, 68, 68, 0.2));
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #991b1b;
        }

        .empty {
            padding: 18px;
            border-radius: 18px;
            background: rgba(248, 251, 255, 0.96);
            border: 1px dashed var(--line);
            color: var(--muted);
        }

        @media (max-width: 1100px) {

            .hero,
            .reports-grid,
            .range-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 820px) {
            .container {
                grid-template-columns: 1fr;
                padding: 16px;
            }

            .sidebar {
                flex-direction: row;
                justify-content: center;
                padding: 14px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .hero-stats,
            .form-grid,
            .filter-grid,
            .range-picker-row {
                grid-template-columns: 1fr;
            }

            .submit-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        function Icon({ name }) {
            const icons = {
                dashboard: (
                    <path d="M3 13h8V3H3zm10 8h8v-6h-8zm0-10h8V3h-8zM3 21h8v-4H3z" />
                ),
                chart: (
                    <>
                        <path d="M4 19V5" />
                        <path d="M10 19V9" />
                        <path d="M16 19V12" />
                        <path d="M22 19V7" />
                    </>
                ),
                users: (
                    <>
                        <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" />
                        <circle cx="9.5" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </>
                ),
                layers: (
                    <>
                        <path d="m12 3 9 5-9 5-9-5 9-5Z" />
                        <path d="m3 12 9 5 9-5" />
                        <path d="m3 16 9 5 9-5" />
                    </>
                ),
                calendar: (
                    <>
                        <path d="M8 2v4" />
                        <path d="M16 2v4" />
                        <rect x="3" y="5" width="18" height="16" rx="2" />
                        <path d="M3 10h18" />
                    </>
                ),
                total: (
                    <>
                        <circle cx="12" cy="12" r="9" />
                        <path d="M8 12h8" />
                        <path d="M12 8v8" />
                    </>
                ),
                image: (
                    <>
                        <rect x="3" y="5" width="18" height="14" rx="2" />
                        <circle cx="9" cy="10" r="1.5" />
                        <path d="m21 16-5-5L5 21" />
                    </>
                ),
                team: (
                    <>
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </>
                ),
                member: (
                    <>
                        <path d="M20 21a8 8 0 1 0-16 0" />
                        <circle cx="12" cy="7" r="4" />
                    </>
                ),
                batch: (
                    <>
                        <rect x="3" y="4" width="18" height="6" rx="2" />
                        <rect x="3" y="14" width="18" height="6" rx="2" />
                    </>
                ),
                submit: (
                    <>
                        <path d="m22 2-7 20-4-9-9-4Z" />
                        <path d="M22 2 11 13" />
                    </>
                ),
                edit: (
                    <>
                        <path d="M12 20h9" />
                        <path d="m16.5 3.5 4 4L8 20l-4 1 1-4 11.5-13.5z" />
                    </>
                ),
                trash: (
                    <>
                        <path d="M3 6h18" />
                        <path d="M8 6V4h8v2" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                        <path d="M10 11v6" />
                        <path d="M14 11v6" />
                    </>
                ),
                close: (
                    <>
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </>
                ),
                check: (
                    <>
                        <path d="M20 6 9 17l-5-5" />
                    </>
                ),
                alert: (
                    <>
                        <circle cx="12" cy="12" r="9" fill="none" />
                        <path d="M15 9l-6 6" stroke="#ef4444" strokeWidth="2.5" />
                        <path d="M9 9l6 6" stroke="#ef4444" strokeWidth="2.5" />
                    </>
                ),
                breakdown: (
                    <>
                        <path d="M3 3v18h18" />
                        <path d="m7 15 4-4 3 3 6-6" />
                    </>
                ),
                activity: (
                    <>
                        <path d="M3 12h4l3-8 4 16 3-8h4" />
                    </>
                ),
                download: (
                    <>
                        <path d="M12 3v11" />
                        <path d="m7 10 5 5 5-5" />
                        <path d="M4 21h16" />
                    </>
                ),
                profile: (
                    <>
                        <circle cx="12" cy="8" r="4" />
                        <path d="M4 21a8 8 0 0 1 16 0" />
                        <path d="M19 9h3" />
                        <path d="M20.5 7.5v3" />
                    </>
                ),
                search: (
                    <>
                        <circle cx="11" cy="11" r="7" />
                        <path d="m21 21-4.3-4.3" />
                    </>
                )
            };

            return (
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    {icons[name]}
                </svg>
            );
        }

        function DateField({ value, onChange, ariaLabel }) {
            const inputRef = React.useRef(null);

            function openPicker() {
                if (!inputRef.current) return;
                inputRef.current.focus();
                if (typeof inputRef.current.showPicker === "function") {
                    inputRef.current.showPicker();
                } else {
                    inputRef.current.click();
                }
            }

            return (
                <div className="date-input-wrap" onClick={openPicker}>
                    <input
                        ref={inputRef}
                        type="date"
                        value={value}
                        aria-label={ariaLabel}
                        onChange={onChange}
                    />
                    <button
                        type="button"
                        className="date-trigger"
                        aria-label={`Open ${ariaLabel}`}
                        onClick={(event) => {
                            event.stopPropagation();
                            openPicker();
                        }}
                    >
                        <Icon name="calendar" />
                    </button>
                </div>
            );
        }

        function App() {
            const today = new Date().toISOString().split("T")[0];
            function getViewFromLocation() {
                if (window.location.hash === "#/team-report-dashboard") return "team-report";
                if (window.location.hash === "#/date-range-report-dashboard") return "range-report";
                if (window.location.hash === "#/member-settings-dashboard") return "member-settings";
                return "dashboard";
            }

            const viewFromPath = getViewFromLocation();
            const [teams, setTeams] = React.useState([]);
            const [members, setMembers] = React.useState([]);
            const [activeView, setActiveView] = React.useState(viewFromPath);
            const [team, setTeam] = React.useState("");
            const [member, setMember] = React.useState("");
            const [batch, setBatch] = React.useState("");
            const [count, setCount] = React.useState("");
            const [dashboardDate, setDashboardDate] = React.useState(today);
            const [entryDate, setEntryDate] = React.useState(today);
            const [teamReportTeam, setTeamReportTeam] = React.useState("");
            const [teamReportDate, setTeamReportDate] = React.useState(today);
            const [rangeStartDate, setRangeStartDate] = React.useState(today);
            const [rangeEndDate, setRangeEndDate] = React.useState(today);

            const [personReport, setPersonReport] = React.useState([]);
            const [teamReport, setTeamReport] = React.useState([]);
            const [teamDetailReport, setTeamDetailReport] = React.useState([]);
            const [teamMemberReport, setTeamMemberReport] = React.useState([]);
            const [rangeTeamReport, setRangeTeamReport] = React.useState([]);
            const [rangeMemberReport, setRangeMemberReport] = React.useState([]);
            const [selectedRangeMember, setSelectedRangeMember] = React.useState(null);
            const [selectedRangeMemberBatches, setSelectedRangeMemberBatches] = React.useState([]);
            const [isMemberBatchesLoading, setIsMemberBatchesLoading] = React.useState(false);
            const [downloadingRangeMemberId, setDownloadingRangeMemberId] = React.useState(null);
            const [memberDirectory, setMemberDirectory] = React.useState([]);
            const [savingMemberId, setSavingMemberId] = React.useState(null);
            const [selectedBreakdownMember, setSelectedBreakdownMember] = React.useState(null);
            const [selectedBreakdownBatches, setSelectedBreakdownBatches] = React.useState([]);
            const [isBreakdownBatchesLoading, setIsBreakdownBatchesLoading] = React.useState(false);
            const [breakdownBatchError, setBreakdownBatchError] = React.useState("");
            const [toast, setToast] = React.useState(null);
            const [batchError, setBatchError] = React.useState("");
            const [editingBatchId, setEditingBatchId] = React.useState(null);
            const [editBatchName, setEditBatchName] = React.useState("");
            const [editImageCount, setEditImageCount] = React.useState("");
            const [batchActionError, setBatchActionError] = React.useState("");
            const [batchLookup, setBatchLookup] = React.useState("");
            const [batchLookupResults, setBatchLookupResults] = React.useState([]);
            const [batchLookupError, setBatchLookupError] = React.useState("");
            const [isBatchLookupLoading, setIsBatchLookupLoading] = React.useState(false);
            const batchLookupRequestRef = React.useRef(0);

            React.useEffect(() => {
                fetch("http://127.0.0.1:8000/teams")
                    .then(res => res.json())
                    .then(setTeams);
            }, []);

            React.useEffect(() => {
                function syncViewWithLocation() {
                    setActiveView(getViewFromLocation());
                }

                syncViewWithLocation();
                window.addEventListener("hashchange", syncViewWithLocation);

                return () => window.removeEventListener("hashchange", syncViewWithLocation);
            }, []);

            React.useEffect(() => {
                loadReports(dashboardDate);
            }, [dashboardDate]);

            React.useEffect(() => {
                if (!teamReportTeam || !teamReportDate) {
                    setTeamMemberReport([]);
                    setEditingBatchId(null);
                    return;
                }

                setEditingBatchId(null);
                setBatchActionError("");
                loadTeamMemberReport(teamReportTeam, teamReportDate);
            }, [teamReportTeam, teamReportDate]);

            React.useEffect(() => {
                if (!rangeStartDate || !rangeEndDate) return;
                loadRangeReports(rangeStartDate, rangeEndDate);
                if (selectedRangeMember) {
                    loadSelectedMemberBatches(selectedRangeMember.member_id, rangeStartDate, rangeEndDate);
                }
            }, [rangeStartDate, rangeEndDate]);

            React.useEffect(() => {
                if (!selectedRangeMember) return;
                const exists = rangeMemberReport.some(item => item.member_id === selectedRangeMember.member_id);
                if (!exists) {
                    setSelectedRangeMember(null);
                    setSelectedRangeMemberBatches([]);
                }
            }, [rangeMemberReport, selectedRangeMember]);

            React.useEffect(() => {
                if (!toast) return;

                const timeoutId = window.setTimeout(() => {
                    setToast(null);
                }, 3000);

                return () => window.clearTimeout(timeoutId);
            }, [toast]);

            React.useEffect(() => {
                if (!selectedBreakdownMember) return;
                loadBreakdownMemberBatches(selectedBreakdownMember.member_id, dashboardDate);
            }, [dashboardDate]);

            React.useEffect(() => {
                const hasOpenModal = Boolean(selectedBreakdownMember || selectedRangeMember);
                const previousOverflow = document.body.style.overflow;

                if (hasOpenModal) {
                    document.body.style.overflow = "hidden";
                }

                return () => {
                    document.body.style.overflow = previousOverflow;
                };
            }, [selectedBreakdownMember, selectedRangeMember]);

            React.useEffect(() => {
                if (activeView !== "member-settings") return;
                loadMemberDirectory();
            }, [activeView]);

            React.useEffect(() => {
                const normalizedBatch = (batchLookup || "").trim();
                if (!normalizedBatch) {
                    setBatchLookupResults([]);
                    setBatchLookupError("");
                    setIsBatchLookupLoading(false);
                    return;
                }

                const timeoutId = window.setTimeout(async () => {
                    const requestId = Date.now();
                    batchLookupRequestRef.current = requestId;
                    setIsBatchLookupLoading(true);
                    setBatchLookupError("");

                    try {
                        const response = await fetch(`http://127.0.0.1:8000/report/batch-search/${encodeURIComponent(normalizedBatch)}`);
                        if (!response.ok) {
                            let message = "Unable to search batch details.";
                            try {
                                const errorData = await response.json();
                                message = errorData.detail || message;
                            } catch (_) {
                                // keep fallback
                            }
                            if (batchLookupRequestRef.current === requestId) {
                                setBatchLookupResults([]);
                                setBatchLookupError(message);
                            }
                            return;
                        }

                        const data = await response.json();
                        if (batchLookupRequestRef.current === requestId) {
                            setBatchLookupResults(Array.isArray(data) ? data : []);
                            setBatchLookupError("");
                        }
                    } catch (_) {
                        if (batchLookupRequestRef.current === requestId) {
                            setBatchLookupResults([]);
                            setBatchLookupError("Server is not reachable. Please try again.");
                        }
                    } finally {
                        if (batchLookupRequestRef.current === requestId) {
                            setIsBatchLookupLoading(false);
                        }
                    }
                }, 220);

                return () => window.clearTimeout(timeoutId);
            }, [batchLookup]);

            function loadMembers(teamId) {
                setTeam(teamId);
                setMember("");

                if (!teamId) {
                    setMembers([]);
                    return;
                }

                fetch(`http://127.0.0.1:8000/members/${teamId}`)
                    .then(res => res.json())
                    .then(setMembers);
            }

            function loadMemberDirectory() {
                fetch("http://127.0.0.1:8000/members-directory")
                    .then(res => res.json())
                    .then(data => {
                        const hydrated = data.map((memberItem) => ({
                            ...memberItem,
                            edit_name: memberItem.name || "",
                            edit_profile_image: memberItem.profile_image || ""
                        }));
                        setMemberDirectory(hydrated);
                    });
            }

            function updateMemberRow(memberId, patch) {
                setMemberDirectory((prev) => prev.map((row) => (
                    row.id === memberId ? { ...row, ...patch } : row
                )));
            }

            function handleMemberPhotoFile(memberId, event) {
                const file = event.target.files?.[0];
                if (!file) return;

                if (!file.type.startsWith("image/")) {
                    setToast({
                        type: "error",
                        title: "Invalid file",
                        message: "Please select an image file."
                    });
                    return;
                }

                const reader = new FileReader();
                reader.onload = () => {
                    updateMemberRow(memberId, {
                        edit_profile_image: String(reader.result || "")
                    });
                };
                reader.readAsDataURL(file);
            }

            async function saveMemberProfile(memberItem) {
                const trimmedName = (memberItem.edit_name || "").trim();
                if (!trimmedName) {
                    setToast({
                        type: "error",
                        title: "Name required",
                        message: "Member name cannot be empty."
                    });
                    return;
                }

                setSavingMemberId(memberItem.id);
                try {
                    const response = await fetch(`http://127.0.0.1:8000/members/${memberItem.id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            name: trimmedName,
                            profile_image: memberItem.edit_profile_image || ""
                        })
                    });

                    if (!response.ok) {
                        let errorMessage = "Unable to update member.";
                        try {
                            const errorData = await response.json();
                            errorMessage = errorData.detail || errorMessage;
                        } catch (_) {
                            // keep fallback
                        }
                        throw new Error(errorMessage);
                    }

                    setToast({
                        type: "success",
                        title: "Profile updated",
                        message: `${trimmedName} was updated successfully.`
                    });
                    loadMemberDirectory();
                    loadReports(dashboardDate);
                    if (rangeStartDate && rangeEndDate) {
                        loadRangeReports(rangeStartDate, rangeEndDate);
                    }
                    if (team) {
                        loadMembers(team);
                    }
                } catch (error) {
                    setToast({
                        type: "error",
                        title: "Update failed",
                        message: error.message || "Unable to update member."
                    });
                } finally {
                    setSavingMemberId(null);
                }
            }

            function loadTeamMemberReport(teamId = teamReportTeam, selectedDate = teamReportDate) {
                if (!teamId || !selectedDate) {
                    setTeamMemberReport([]);
                    return;
                }

                fetch(`http://127.0.0.1:8000/report/team-member-batches/${teamId}/${selectedDate}`)
                    .then(res => res.json())
                    .then(setTeamMemberReport);
            }

            function startBatchEdit(batchItem) {
                setEditingBatchId(batchItem.id);
                setEditBatchName(batchItem.batch_name || "");
                setEditImageCount(String(batchItem.image_count || ""));
                setBatchActionError("");
            }

            function cancelBatchEdit() {
                setEditingBatchId(null);
                setEditBatchName("");
                setEditImageCount("");
                setBatchActionError("");
            }

            async function saveBatchEdit(annotationId) {
                const parsedCount = Number(editImageCount);
                if (!editBatchName.trim() || !editImageCount || !Number.isFinite(parsedCount) || parsedCount <= 0) {
                    setBatchActionError("Batch name and image count are required.");
                    return;
                }

                const response = await fetch(`http://127.0.0.1:8000/annotations/${annotationId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        batch_name: editBatchName,
                        image_count: parsedCount
                    })
                });

                if (!response.ok) {
                    let message = "Unable to update entry.";
                    try {
                        const errorData = await response.json();
                        message = errorData.detail || message;
                    } catch (_) {
                        // ignore parse errors and keep generic message
                    }

                    setBatchActionError(message);
                    setToast({
                        type: "error",
                        title: "Update failed",
                        message
                    });
                    return;
                }

                cancelBatchEdit();
                loadTeamMemberReport();
                loadReports(dashboardDate);
                setToast({
                    type: "success",
                    title: "Entry updated",
                    message: "Batch details were updated successfully."
                });
            }

            async function deleteBatch(annotationId) {
                if (!window.confirm("Delete this batch entry?")) return;

                const response = await fetch(`http://127.0.0.1:8000/annotations/${annotationId}`, {
                    method: "DELETE"
                });

                if (!response.ok) {
                    let message = "Unable to delete entry.";
                    try {
                        const errorData = await response.json();
                        message = errorData.detail || message;
                    } catch (_) {
                        // ignore parse errors and keep generic message
                    }

                    setToast({
                        type: "error",
                        title: "Delete failed",
                        message
                    });
                    return;
                }

                if (editingBatchId === annotationId) {
                    cancelBatchEdit();
                }

                loadTeamMemberReport();
                loadReports(dashboardDate);
                setToast({
                    type: "success",
                    title: "Entry deleted",
                    message: "Batch entry was removed."
                });
            }

            async function submit() {
                if (!member || !batch || !count) {
                    alert("Please select a member and fill in batch name and image count.");
                    return;
                }

                setBatchError("");

                const response = await fetch("http://127.0.0.1:8000/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        member_id: member,
                        batch_name: batch,
                        image_count: count,
                        created_at: entryDate
                    })
                });

                if (!response.ok) {
                    let message = "Unable to save entry.";
                    try {
                        const errorData = await response.json();
                        message = errorData.detail || message;
                    } catch (_) {
                        // ignore parse errors and keep generic message
                    }

                    const isDuplicateBatch = response.status === 409 || /batch/i.test(message) && /exist/i.test(message);
                    if (isDuplicateBatch) {
                        const duplicateMessage = message || "Batch Alredy exist";
                        setBatchError(duplicateMessage);
                        setToast({
                            type: "error",
                            title: "Duplicate batch",
                            message: duplicateMessage
                        });
                    } else {
                        alert(message);
                    }
                    return;
                }

                setBatch("");
                setCount("");
                setBatchError("");
                setToast({
                    type: "success",
                    title: "Entry added successfully",
                    message: `Batch ${batch} was saved for the selected member.`
                });
                loadReports(dashboardDate);
            }

            function openView(nextView) {
                const nextPath = nextView === "team-report"
                    ? "#/team-report-dashboard"
                    : nextView === "range-report"
                        ? "#/date-range-report-dashboard"
                        : nextView === "member-settings"
                            ? "#/member-settings-dashboard"
                        : "#/annotation-dashboard";
                window.location.hash = nextPath;
            }

            function loadReports(selectedDate = dashboardDate) {
                fetch(`http://127.0.0.1:8000/report/person-by-date/${selectedDate}`)
                    .then(res => res.json())
                    .then(setPersonReport);

                fetch("http://127.0.0.1:8000/report/team")
                    .then(res => res.json())
                    .then(data => {
                        const sorted = [...data].sort((a, b) => Number(b.total || 0) - Number(a.total || 0));
                        setTeamReport(sorted);
                    });

                fetch(`http://127.0.0.1:8000/report/team-detail/${selectedDate}`)
                    .then(res => res.json())
                    .then(setTeamDetailReport);
            }

            function loadRangeReports(startDate = rangeStartDate, endDate = rangeEndDate) {
                const normalizedStart = startDate <= endDate ? startDate : endDate;
                const normalizedEnd = startDate <= endDate ? endDate : startDate;

                fetch(`http://127.0.0.1:8000/report/team-by-range/${normalizedStart}/${normalizedEnd}`)
                    .then(res => res.json())
                    .then(data => {
                        const sorted = [...data].sort((a, b) => Number(b.total || 0) - Number(a.total || 0));
                        setRangeTeamReport(sorted);
                    });

                fetch(`http://127.0.0.1:8000/report/member-by-range/${normalizedStart}/${normalizedEnd}`)
                    .then(res => res.json())
                    .then(data => {
                        const sorted = [...data].sort((a, b) => Number(b.total || 0) - Number(a.total || 0));
                        setRangeMemberReport(sorted);
                    });
            }

            function loadSelectedMemberBatches(memberId, startDate = rangeStartDate, endDate = rangeEndDate) {
                const normalizedStart = startDate <= endDate ? startDate : endDate;
                const normalizedEnd = startDate <= endDate ? endDate : startDate;

                setIsMemberBatchesLoading(true);
                fetch(`http://127.0.0.1:8000/report/member-batches-by-range/${memberId}/${normalizedStart}/${normalizedEnd}`)
                    .then(res => res.json())
                    .then(data => {
                        setSelectedRangeMemberBatches(data);
                    })
                    .finally(() => setIsMemberBatchesLoading(false));
            }

            function handleRangeMemberClick(memberItem) {
                if (selectedRangeMember?.member_id === memberItem.member_id) {
                    setSelectedRangeMember(null);
                    setSelectedRangeMemberBatches([]);
                    return;
                }

                setSelectedRangeMember(memberItem);
                loadSelectedMemberBatches(memberItem.member_id);
            }

            function sanitizeFilePart(value) {
                return String(value || "user")
                    .trim()
                    .replace(/[\\/:*?"<>|]/g, "")
                    .replace(/\s+/g, "_");
            }

            function escapeHtml(value) {
                return String(value || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function waitForImages(container) {
                const images = Array.from(container.querySelectorAll("img"));
                if (!images.length) return Promise.resolve();

                return Promise.all(images.map((img) => {
                    if (img.complete && img.naturalWidth > 0) {
                        return Promise.resolve();
                    }
                    return new Promise((resolve) => {
                        const done = () => resolve();
                        img.addEventListener("load", done, { once: true });
                        img.addEventListener("error", done, { once: true });
                        window.setTimeout(done, 1500);
                    });
                }));
            }

            async function downloadRangeMemberPdf(memberItem, event) {
                event.stopPropagation();
                if (downloadingRangeMemberId) return;

                if (!window.jspdf || !window.jspdf.jsPDF || !window.html2canvas) {
                    setToast({
                        type: "error",
                        title: "PDF unavailable",
                        message: "PDF library failed to load. Please refresh and try again."
                    });
                    return;
                }

                const normalizedStart = rangeStartDate <= rangeEndDate ? rangeStartDate : rangeEndDate;
                const normalizedEnd = rangeStartDate <= rangeEndDate ? rangeEndDate : rangeStartDate;

                setDownloadingRangeMemberId(memberItem.member_id);
                let renderHost = null;
                try {
                    const [batchResponse, templateResponse] = await Promise.all([
                        fetch(`http://127.0.0.1:8000/report/member-batches-by-range/${memberItem.member_id}/${normalizedStart}/${normalizedEnd}`),
                        fetch("http://127.0.0.1:8000/member-report-template")
                    ]);

                    if (!batchResponse.ok) {
                        throw new Error("Unable to fetch member batches.");
                    }
                    if (!templateResponse.ok) {
                        throw new Error("Unable to load PDF template.");
                    }

                    const [batches, templateHtml] = await Promise.all([
                        batchResponse.json(),
                        templateResponse.text()
                    ]);
                    const computedTotal = batches.reduce((sum, item) => sum + (Number(item.image_count) || 0), 0);
                    const totalImages = batches.length ? computedTotal : (Number(memberItem.total) || 0);

                    const batchRowsHtml = batches.length
                        ? `
                            <table>
                                <thead>
                                    <tr>
                                        <th>Batch Number</th>
                                        <th>Date</th>
                                        <th class="num">Images</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${batches.map((batchItem) => `
                                        <tr>
                                            <td>${escapeHtml(batchItem.batch_name || "-")}</td>
                                            <td>${escapeHtml(batchItem.created_at || "-")}</td>
                                            <td class="num">${escapeHtml(batchItem.image_count || 0)}</td>
                                        </tr>
                                    `).join("")}
                                </tbody>
                            </table>
                        `
                        : `<div class="empty">No batches found in selected date range.</div>`;

                    const hydratedHtml = templateHtml
                        .replaceAll("{{member_name}}", escapeHtml(memberItem.member_name || "Member"))
                        .replaceAll("{{team_name}}", escapeHtml(memberItem.team_name || "-"))
                        .replaceAll("{{date_range}}", `${escapeHtml(normalizedStart)} to ${escapeHtml(normalizedEnd)}`)
                        .replaceAll("{{total_images}}", escapeHtml(totalImages))
                        .replaceAll("{{copyright_year}}", escapeHtml(new Date().getFullYear()))
                        .replaceAll("{{generated_on}}", escapeHtml(new Date().toLocaleString()))
                        .replaceAll("{{batch_content}}", batchRowsHtml);

                    renderHost = document.createElement("div");
                    renderHost.style.position = "fixed";
                    renderHost.style.left = "-10000px";
                    renderHost.style.top = "0";
                    renderHost.style.width = "794px";
                    renderHost.style.pointerEvents = "none";
                    renderHost.style.zIndex = "0";
                    renderHost.innerHTML = hydratedHtml;
                    document.body.appendChild(renderHost);
                    await waitForImages(renderHost);

                    const { jsPDF } = window.jspdf;
                    const reportNode = renderHost.querySelector(".report") || renderHost;
                    const canvas = await window.html2canvas(reportNode, {
                        scale: 2,
                        backgroundColor: "#f4f7ff",
                        useCORS: true
                    });

                    const doc = new jsPDF({ unit: "pt", format: "a4", orientation: "portrait" });
                    const pdfWidth = doc.internal.pageSize.getWidth();
                    const pdfHeight = doc.internal.pageSize.getHeight();
                    const margin = 18;
                    const contentWidth = pdfWidth - (margin * 2);
                    const scaleRatio = contentWidth / canvas.width;
                    const pageCanvas = document.createElement("canvas");
                    const pageCtx = pageCanvas.getContext("2d");
                    const pagePixelHeight = Math.floor((pdfHeight - (margin * 2)) / scaleRatio);
                    let renderedHeight = 0;
                    let pageIndex = 0;

                    while (renderedHeight < canvas.height) {
                        const sliceHeight = Math.min(pagePixelHeight, canvas.height - renderedHeight);
                        pageCanvas.width = canvas.width;
                        pageCanvas.height = sliceHeight;
                        pageCtx.clearRect(0, 0, pageCanvas.width, pageCanvas.height);
                        pageCtx.drawImage(
                            canvas,
                            0,
                            renderedHeight,
                            canvas.width,
                            sliceHeight,
                            0,
                            0,
                            canvas.width,
                            sliceHeight
                        );

                        if (pageIndex > 0) {
                            doc.addPage();
                        }

                        const pageImage = pageCanvas.toDataURL("image/png");
                        const renderedPdfHeight = sliceHeight * scaleRatio;
                        doc.addImage(pageImage, "PNG", margin, margin, contentWidth, renderedPdfHeight, undefined, "FAST");

                        renderedHeight += sliceHeight;
                        pageIndex += 1;
                    }

                    const filename = `${sanitizeFilePart(memberItem.member_name)}_${normalizedStart}_to_${normalizedEnd}.pdf`;
                    doc.save(filename);
                    setToast({
                        type: "success",
                        title: "PDF downloaded",
                        message: `Saved ${filename}`
                    });
                } catch (error) {
                    setToast({
                        type: "error",
                        title: "Download failed",
                        message: error.message || "Unable to generate PDF."
                    });

                        renderHost.parentNode.removeChild(renderHost);

                                                            />
                                                        </td>
                                                        <td>{memberItem.team_name}</td>
                                                        <td>
                                                            <input
                                                                type="file"
                                                                accept="image/*"
                                                                onChange={(event) => handleMemberPhotoFile(memberItem.id, event)}
                                                            />
                                                        </td>
                                                        <td>
                                                            <button
                                                                type="button"
                                                                className="icon-button icon-button-success"
                                                                title="Save member profile"
                                                                onClick={() => saveMemberProfile(memberItem)}
                                                                disabled={savingMemberId === memberItem.id}
                                                            >
                                                                <Icon name="check" />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    ) : (
                                        <div className="empty">No members found.</div>
                                    )}
                                </section>
                            </section>
                        ) : (
                            <section className="range-report-shell">
                                <section className="filter-panel panel">
                                    <div className="eyebrow">Date Range Filter</div>
                                    <div className="section-title-row">
                                        <div className="report-icon"><Icon name="calendar" /></div>
                                        <h2 className="section-title">Select range for team and member report</h2>
                                    </div>
                                    <p className="section-copy">Pick start and end dates. Data refreshes automatically and includes only submissions inside the selected range.</p>

                                    <div className="range-picker-row">
                                        <div className="field">
                                            <label className="field-label"><Icon name="calendar" />Start date</label>
                                            <DateField value={rangeStartDate} onChange={e => setRangeStartDate(e.target.value)} ariaLabel="range start date" />
                                        </div>

                                        <div className="field">
                                            <label className="field-label"><Icon name="calendar" />End date</label>
                                            <DateField value={rangeEndDate} onChange={e => setRangeEndDate(e.target.value)} ariaLabel="range end date" />
                                        </div>
                                    </div>
                                </section>

                                <section className="range-grid">
                                    <article className="report-card panel">
                                        <div className="report-head range-list-head">
                                            <div className="report-title">
                                                <div className="report-icon"><Icon name="team" /></div>
                                                <div>
                                                    <div className="kicker">Date Range</div>
                                                    <h3>Team-wise Image Summary</h3>
                                                </div>
                                            </div>
                                        </div>

                                        {rangeTeamReport.length ? (
                                            <ul className="list">
                                                {rangeTeamReport.map(teamItem => (
                                                    <li className="list-item" key={teamItem.team_id}>
                                                        <div>
                                                            <strong>{teamItem.team_name}</strong>
                                                            <span className="list-meta"><Icon name="image" />Images submitted in range</span>
                                                        </div>
                                                        <div className="value-pill">{teamItem.total || 0}</div>
                                                    </li>
                                                ))}
                                            </ul>
                                        ) : (
                                            <div className="empty">No team records found for this range.</div>
                                        )}
                                    </article>

                                    <article className="report-card panel">
                                        <div className="report-head range-list-head">
                                            <div className="report-title">
                                                <div className="report-icon"><Icon name="member" /></div>
                                                <div>
                                                    <div className="kicker">Date Range</div>
                                                    <h3>Individual Member Summary</h3>
                                                </div>
                                            </div>
                                        </div>

                                        {rangeMemberReport.length ? (
                                            <>
                                                <ul className="list">
                                                    {rangeMemberReport.map(memberItem => (
                                                    <li
                                                        className={`list-item clickable-row ${selectedRangeMember?.member_id === memberItem.member_id ? "active" : ""}`}
                                                        key={memberItem.member_id}
                                                        onClick={() => handleRangeMemberClick(memberItem)}
                                                    >
                                                        <div>
                                                            <strong>{memberItem.member_name}</strong>
                                                            <span className="list-meta"><Icon name="team" />{memberItem.team_name}</span>
                                                        </div>
                                                        <div className="batch-row-right">
                                                            <div className="value-pill">{memberItem.total || 0}</div>
                                                            <button
                                                                type="button"
                                                                className="icon-button"
                                                                title="Download member PDF"
                                                                onClick={(event) => downloadRangeMemberPdf(memberItem, event)}
                                                                disabled={downloadingRangeMemberId === memberItem.member_id}
                                                                aria-label={`Download PDF for ${memberItem.member_name}`}
                                                            >
                                                                <Icon name="download" />
                                                            </button>
                                                        </div>
                                                    </li>
                                                    ))}
                                                </ul>
                                            </>
                                        ) : (
                                            <div className="empty">No member records found for this range.</div>
                                        )}
                                    </article>
                                </section>
                            </section>
                        )}

                        {selectedBreakdownMember ? (
                            <div className="modal-overlay" onClick={closeBreakdownModal}>
                                <div className="modal-card panel" onClick={(event) => event.stopPropagation()}>
                                    <div className="modal-head">
                                        <div>
                                            <div className="kicker">Selected Date</div>
                                            <h3>{selectedBreakdownMember.member} Batches</h3>
                                            <p className="modal-copy">{dashboardDate}</p>
                                        </div>
                                        <button type="button" className="icon-button" onClick={closeBreakdownModal} aria-label="Close modal">
                                            <Icon name="close" />
                                        </button>
                                    </div>
                                    <div className={`modal-total-bar ${breakdownTotalIsHigh ? "good" : "bad"}`}>
                                        Total images: {breakdownModalTotal}
                                    </div>

                                    {isBreakdownBatchesLoading ? (
                                        <div className="empty">Loading batches...</div>
                                    ) : breakdownBatchError ? (
                                        <div className="empty">{breakdownBatchError}</div>
                                    ) : selectedBreakdownBatches.length ? (
                                        <ul className="list">
                                            {selectedBreakdownBatches.map((batchItem) => (
                                                <li className="list-item" key={batchItem.id}>
                                                    <div>
                                                        <strong>{batchItem.batch_name}</strong>
                                                        <span className="list-meta">Batch Number</span>
                                                    </div>
                                                    <div className="value-pill">{batchItem.image_count || 0}</div>
                                                </li>
                                            ))}
                                        </ul>
                                    ) : (
                                        <div className="empty">No batches submitted by this member on the selected date.</div>
                                    )}
                                </div>
                            </div>
                        ) : null}

                        {selectedRangeMember ? (
                            <div className="modal-overlay" onClick={closeRangeMemberModal}>
                                <div className="modal-card panel" onClick={(event) => event.stopPropagation()}>
                                    <div className="modal-head">
                                        <div>
                                            <div className="kicker">Date Range</div>
                                            <h3>{selectedRangeMember.member_name} Batches</h3>
                                            <p className="modal-copy">{rangeStartDate} to {rangeEndDate}</p>
                                        </div>
                                        <button type="button" className="icon-button" onClick={closeRangeMemberModal} aria-label="Close modal">
                                            <Icon name="close" />
                                        </button>
                                    </div>
                                    <div className={`modal-total-bar ${rangeTotalIsHigh ? "good" : "bad"}`}>
                                        Total images: {rangeModalTotal}
                                    </div>

                                    {isMemberBatchesLoading ? (
                                        <div className="empty">Loading batches...</div>
                                    ) : selectedRangeMemberBatches.length ? (
                                        <ul className="list">
                                            {selectedRangeMemberBatches.map((batchItem) => (
                                                <li className="list-item" key={batchItem.id}>
                                                    <div>
                                                        <strong>{batchItem.batch_name}</strong>
                                                        <span className="list-meta"><Icon name="calendar" />{batchItem.created_at}</span>
                                                    </div>
                                                    <div className="value-pill">{batchItem.image_count || 0}</div>
                                                </li>
                                            ))}
                                        </ul>
                                    ) : (
                                        <div className="empty">No batches submitted by this member in the selected range.</div>
                                    )}
                                </div>
                            </div>
                        ) : null}
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
